<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | Fast Tools</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🔐 Password Generator</h1>

    <p>安全なパスワードを生成します。</p>

    <label>文字数</label>

    <input
        type="number"
        id="length"
        value="16"
        min="8"
        max="64"
    >

    <div class="options">

        <label><input type="checkbox" id="upper" checked> 大文字(A-Z)</label>

        <label><input type="checkbox" id="lower" checked> 小文字(a-z)</label>

        <label><input type="checkbox" id="number" checked> 数字(0-9)</label>

        <label><input type="checkbox" id="symbol" checked> 記号(!@#)</label>

    </div>

    <button onclick="generatePassword()">
        パスワード生成
    </button>

    <input
        id="result"
        readonly
        placeholder="ここに表示されます"
    >

    <button onclick="copyPassword()">
        コピー
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
