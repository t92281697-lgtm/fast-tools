<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Tools</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

main{
    max-width:900px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>

</head>

<body>

<header>
<h1>⚡ Fast Tools</h1>
<p>無料で使える便利ツール</p>
</header>

<main>

<div class="card">
<h2>QR Generator</h2>
<p>近日公開</p>
<button>Coming Soon</button>
</div>

<div class="card">
<h2>JSON Formatter</h2>
<p>近日公開</p>
<button>Coming Soon</button>
</div>

<div class="card">
<h2>Password Generator</h2>
<p>近日公開</p>
<button>Coming Soon</button>
</div>

</main>

</body>
</html>
